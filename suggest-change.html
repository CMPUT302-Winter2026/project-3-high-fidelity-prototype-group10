<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suggest a Change</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    /* Layout spacing */
    .section {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 20px;
    }

    /* Input styled like a proper card */
    .text-input {
      background: #fff;
      border: 2px solid #e8d4b8;
      border-radius: 12px;
      padding: 16px;
      font-size: 1rem;
      min-height: 180px;
      resize: none;
      box-sizing: border-box;
      color: #2c1a0e;
    }

    .text-input:focus {
      outline: none;
      border-color: #c4813a;
      background: #fffaf4;
    }

    /* Submit button spacing */
    .submit-wrapper {
      margin-top: 10px;
    }

    /* Modal */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.35);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .overlay.show {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      width: 80%;
      max-width: 280px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .modal-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #2c1a0e;
    }

    .modal-buttons {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 18px;
    }

    .modal-buttons button {
      flex: 1;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- Header -->
  <div class="top-bar">
    <button class="hamburger" onclick="history.back()">←</button>
    <span class="top-title">Type missing word or mistake in app</span>
  </div>

  <!-- Content -->
  <div class="section">

    <textarea 
      id="suggestionInput"
      class="text-input"
      placeholder="Describe the missing word or mistake...">
    </textarea>

    <div class="submit-wrapper">
      <button class="category-item" onclick="openModal()">
        Submit
      </button>
    </div>

  </div>

</div>

<!-- Modal -->
<div id="overlay" class="overlay">
  <div class="modal">
    <div class="modal-title">Send suggestion?</div>

    <div class="modal-buttons">
      <button onclick="confirmSubmit()">Yes</button>
      <button onclick="closeModal()">No</button>
    </div>
  </div>
</div>

<script>
  function openModal() {
    document.getElementById("overlay").classList.add("show");
  }

  function closeModal() {
    document.getElementById("overlay").classList.remove("show");
  }

  function confirmSubmit() {
    const input = document.getElementById("suggestionInput");

    if (!input.value.trim()) {
      alert("Please enter a suggestion first.");
      return;
    }

    console.log("Submitted:", input.value);

    closeModal();
    input.value = "";

    alert("Suggestion submitted!");
  }
</script>

</body>
</html>
