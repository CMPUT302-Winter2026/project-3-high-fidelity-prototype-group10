<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nature &amp; Land</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .page-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .back-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      color: #2c1a0e;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .page-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #2c1a0e;
    }
    .phrase-card {
      background: #ddd4cb;
      border-radius: 14px;
      padding: 18px 16px;
      margin-bottom: 18px;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
    }
    .phrase-card:hover { background: #d3c9bf; }
    .phrase-card:active { transform: scale(0.98); }
    .phrase-card-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: #2c1a0e;
    }
    .phrase-card-text {
      font-size: 0.95rem;
      color: #4b3a2d;
      line-height: 1.5;
    }
    .search-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
      margin-bottom: 18px;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      font-size: 1rem;
      color: #a07040;
      pointer-events: none;
    }
    .search-input-wrap input {
      padding-left: 38px;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="page-top">
    <button class="back-btn" onclick="history.back()" aria-label="Go back">&#8592;</button>
    <div class="page-title">Nature &amp; Land</div>
  </div>

  <div class="search-input-wrap">
    <span class="search-icon">&#128269;</span>
    <input id="searchInput" placeholder="Search nature words..." oninput="handleSearch()">
  </div>

  <div id="topicCards">
    <div class="phrase-card" onclick="goTo('everyday-words.html?cat=nature')">
      <div class="phrase-card-title">The Land</div>
      <div class="phrase-card-text">
        askiy - Earth / Land / World<br>
        nipiy - Water<br>
        sîpiy - River
      </div>
    </div>

    <div class="phrase-card" onclick="goTo('everyday-words.html?cat=nature')">
      <div class="phrase-card-title">Sky &amp; Time</div>
      <div class="phrase-card-text">
        pîsim - Sun / Moon / Month<br>
        kîsikâw - It is day / The sky<br>
        tipiskâw - It is night
      </div>
    </div>

    <div class="phrase-card" onclick="goTo('everyday-words.html?cat=nature')">
      <div class="phrase-card-title">Movement on the Land</div>
      <div class="phrase-card-text">
        pimohtêw - He/she walks<br>
        pimipayiw - Run<br>
        papâmohtêw - Walks around / Wanders
      </div>
    </div>
  </div>

  <div id="searchResults" style="display:none;"></div>

</div>

<script src="app.js"></script>
<script>
  function handleSearch() {
    const input = normalize(document.getElementById('searchInput').value);
    const topicCards = document.getElementById('topicCards');
    const resultsDiv = document.getElementById('searchResults');

    if (!input) {
      topicCards.style.display = 'block';
      resultsDiv.style.display = 'none';
      resultsDiv.innerHTML = '';
      return;
    }

    topicCards.style.display = 'none';
    resultsDiv.style.display = 'block';
    resultsDiv.innerHTML = '';

    Object.keys(words).forEach(function(key) {
      const w = words[key];
      if (w.category !== 'nature') return;
      const matches = normalize(key).includes(input)
        || normalize(w.title).includes(input)
        || normalize(w.sub).includes(input)
        || normalize(w.meaning).includes(input);
      if (matches) {
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = '<strong>' + w.title + '</strong><br><span style="font-size:0.9rem;color:#a07040">' + w.sub + '</span>';
        div.onclick = function() {
          localStorage.setItem('selectedWord', key);
          goTo('definition.html');
        };
        resultsDiv.appendChild(div);
      }
    });

    if (resultsDiv.innerHTML === '') {
      resultsDiv.innerHTML = '<div style="text-align:center;padding:24px;color:#a07040;">No results found.</div>';
    }
  }
</script>
</body>
</html>
