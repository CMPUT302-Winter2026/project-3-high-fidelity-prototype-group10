<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Lesson – Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .top-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 12px;
      border-bottom: 3px solid #c4813a;
      margin-bottom: 4px;
    }
    .top-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #7b3a10;
    }
    .lesson-title-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 2px solid #d4a96a;
      border-radius: 0;
      padding: 10px 4px;
      font-size: 1.15rem;
      font-weight: 700;
      color: #2c1a0e;
      outline: none;
      font-family: inherit;
      box-shadow: none;
    }
    .lesson-title-input:focus {
      border-bottom-color: #7b3a10;
      background: transparent;
      box-shadow: none;
    }
    .lesson-title-input::placeholder {
      color: #c4a070;
      font-weight: 400;
    }

    /* Tree */
    .tree-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0 4px;
      gap: 0;
    }
    .tree-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
    .tree-node-box {
      background: #fff;
      border: 2px solid #c4813a;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 600;
      color: #7b3a10;
      width: 100%;
      text-align: center;
      cursor: pointer;
      transition: background 0.18s, box-shadow 0.18s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      position: relative;
    }
    .tree-node-box:hover {
      background: #fffaf4;
      box-shadow: 0 4px 14px rgba(0,0,0,0.11);
    }
    .tree-node-sub {
      font-size: 0.82rem;
      font-weight: 400;
      color: #a07040;
      margin-top: 2px;
    }
    .tree-connector {
      width: 2px;
      height: 28px;
      background: #c4813a;
      flex-shrink: 0;
    }
    .tree-remove-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #c4813a;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      border-radius: 50%;
      transition: background 0.15s, color 0.15s;
    }
    .tree-remove-btn:hover {
      background: #f5e8d4;
      color: #7b3a10;
    }

    .add-node-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.5rem;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: #7b3a10;
      border: 2px solid #c4813a;
      margin-top: 8px;
      transition: background 0.18s;
    }
    .add-node-btn:hover { background: #f5e8d4; }

    .empty-tree {
      text-align: center;
      color: #a07040;
      font-size: 0.95rem;
      padding: 20px 0 8px;
    }

    /* Category picker modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44,26,14,0.35);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open {
      display: flex;
    }
    .modal-sheet {
      background: #fffaf4;
      border-radius: 18px 18px 0 0;
      padding: 24px 20px 36px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .modal-title {
      font-size: 1rem;
      font-weight: 700;
      color: #7b3a10;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 4px;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      color: #a07040;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      align-self: flex-end;
      margin-bottom: -8px;
    }
    .modal-close:hover { color: #7b3a10; background: none; }

    .save-btn {
      width: 100%;
      padding: 16px;
      margin-top: 8px;
      font-size: 1rem;
    }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #7b3a10;
      color: #fff;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 200;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <button class="secondary" style="padding: 8px 14px;" onclick="goTo('home.html')">&#8592;</button>
    <span class="top-title">Create Lesson</span>
  </div>

  <input
    class="lesson-title-input"
    id="lessonTitleInput"
    placeholder="Lesson title (e.g. Kinship Terms)"
    autocomplete="off"
  >

  <div class="section-label" style="margin-top: 8px;">Words in this lesson</div>

  <div class="tree-wrap" id="lessonTree">
    <div class="empty-tree" id="emptyMsg">No words added yet. Tap + to add one.</div>
  </div>

  <div style="display: flex; justify-content: center;">
    <button class="add-node-btn" onclick="openCategoryPicker()" aria-label="Add word">+</button>
  </div>

  <button class="save-btn" onclick="saveLesson()">Send Lesson to Students</button>

</div>

<!-- Category picker modal -->
<div class="modal-overlay" id="categoryModal">
  <div class="modal-sheet">
    <button class="modal-close" onclick="closeModal()">&#10005;</button>
    <div class="modal-title">Pick a category</div>
    <button class="category-item" onclick="pickCategory('everyday')">Everyday Phrases</button>
    <button class="category-item" onclick="pickCategory('kinship')">Kinship Terms</button>
    <button class="category-item" onclick="pickCategory('emotions')">Emotions &amp; Wellbeing</button>
    <button class="category-item" onclick="pickCategory('nature')">Nature &amp; Land</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
<script>
  // Load any in-progress lesson nodes
  let lessonWords = [];

  function loadLessonWords() {
    lessonWords = JSON.parse(localStorage.getItem('currentLessonWords') || '[]');
  }
  const lessonTitle = localStorage.getItem('currentLessonTitle') || '';
  if (lessonTitle) document.getElementById('lessonTitleInput').value = lessonTitle;

  // Save title to localStorage as user types
  document.getElementById('lessonTitleInput').addEventListener('input', function() {
    localStorage.setItem('currentLessonTitle', this.value);
  });

  loadLessonWords();
  renderTree();

  function renderTree() {
    const tree = document.getElementById('lessonTree');
    const empty = document.getElementById('emptyMsg');

    // Clear all nodes (keep emptyMsg)
    Array.from(tree.querySelectorAll('.tree-node, .tree-connector')).forEach(el => el.remove());

    if (lessonWords.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    lessonWords.forEach((key, i) => {
      const w = words[key];
      if (!w) return;

      if (i > 0) {
        const line = document.createElement('div');
        line.className = 'tree-connector';
        tree.appendChild(line);
      }

      const node = document.createElement('div');
      node.className = 'tree-node';

      const box = document.createElement('div');
      box.className = 'tree-node-box';
      box.innerHTML = `
        ${w.title}
        <div class="tree-node-sub">${w.sub}</div>
        <button class="tree-remove-btn" onclick="removeWord('${key}')" title="Remove">&#10005;</button>
      `;
      node.appendChild(box);
      tree.appendChild(node);
    });
  }

  function removeWord(key) {
    lessonWords = lessonWords.filter(k => k !== key);
    localStorage.setItem('currentLessonWords', JSON.stringify(lessonWords));
    renderTree();
  }

  function openCategoryPicker() {
    document.getElementById('categoryModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('categoryModal').classList.remove('open');
  }

  function pickCategory(cat) {
    closeModal();
    localStorage.setItem('searchAddMode', '1');
    goTo('search.html?cat=' + cat + '&addMode=1');
  }

  function saveLesson() {
    const title = document.getElementById('lessonTitleInput').value.trim() || 'Untitled Lesson';
    if (lessonWords.length === 0) {
      showToast('Add at least one word first.');
      return;
    }

    // Load existing lessons and append
    const lessons = JSON.parse(localStorage.getItem('savedLessons') || '[]');
    lessons.push({ title, words: lessonWords, date: new Date().toLocaleDateString() });
    localStorage.setItem('savedLessons', JSON.stringify(lessons));

    // Clear current lesson draft
    localStorage.removeItem('currentLessonWords');
    localStorage.removeItem('currentLessonTitle');

    showToast('Lesson sent Successfully!');
    setTimeout(() => goTo('home.html'), 1200);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // Close modal on overlay tap
  document.getElementById('categoryModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  // Handle back navigation from search results
  window.addEventListener('focus', () => {
  loadLessonWords();
  renderTree();
  }); 
</script>
</body>
</html>
